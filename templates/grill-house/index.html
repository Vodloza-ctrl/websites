<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{seo_title}}</title>
<meta name="description" content="{{seo_description}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --char:{{primary_color}};
  --ember:#D2541F;
  --amber:#E0A12E;
  --cream:#FBF4E9;
  --ink:#2A211A;
  --ink2:#6E6055;
  --paper:#fff;
  --line:rgba(34,26,20,.12);
  --shadow-sm:0 2px 12px rgba(34,26,20,.08);
  --shadow-md:0 20px 44px -20px rgba(34,26,20,.35);
  --r-card:14px;
  --r-pill:999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit}
body{font-family:"Plus Jakarta Sans",sans-serif;color:var(--ink);background:var(--cream);line-height:1.6}
h1,h2,h3{font-family:"Playfair Display",serif;font-weight:700;line-height:1.06}
header{position:sticky;top:0;z-index:100;background:rgba(34,26,20,.96);backdrop-filter:blur(10px)}
.nav{display:flex;align-items:center;justify-content:space-between;max-width:1140px;margin:0 auto;padding:14px 26px}
.logo{font-family:"Playfair Display",serif;font-weight:800;font-size:1.35rem;color:#fff}
.logo b{color:var(--amber)}
.logo-img{height:36px;width:auto;object-fit:contain}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:.88rem;font-weight:500;color:rgba(255,255,255,.78);transition:color .2s}
.nav-links a:hover{color:#fff}
.nav-cta{display:inline-flex;align-items:center;gap:7px;background:var(--ember);color:#fff;font-weight:700;font-size:.88rem;padding:9px 18px;border-radius:var(--r-pill);transition:background .2s}
.nav-cta:hover{background:#B5440F}
.hamburger{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer}
.hamburger span{width:24px;height:2px;background:rgba(255,255,255,.8);display:block}
.mob-menu{display:none;position:fixed;inset:0;z-index:999;background:rgba(34,26,20,.98);flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.mob-menu.open{display:flex}
.mob-menu a{font-size:1.35rem;font-weight:700;color:#fff}
.mob-close{position:absolute;top:1.5rem;right:1.5rem;color:rgba(255,255,255,.7);font-size:1.4rem;cursor:pointer}
@media(max-width:768px){.nav-links{display:none}.hamburger{display:flex}}
.gh-hero{position:relative;min-height:88vh;display:flex;align-items:flex-end;overflow:hidden}
.gh-hero-bg{position:absolute;inset:0}
.gh-hero-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.gh-hero-bg-ph{position:absolute;inset:0;background:linear-gradient(135deg,var(--char),var(--ember))}
.gh-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(34,26,20,.95) 0%,rgba(34,26,20,.42) 50%,rgba(34,26,20,.42) 100%)}
.gh-hero-text{position:relative;z-index:1;color:#fff;padding:0 8% 4.5rem;max-width:760px;width:100%}
.eyebrow{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--amber)}
.gh-hero-text h1{font-size:clamp(2.6rem,6vw,4.6rem);margin:12px 0 14px}
.gh-hero-text p{font-size:1.05rem;max-width:44ch;color:rgba(255,255,255,.88);line-height:1.7}
.hero-btns{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn-amber{display:inline-flex;align-items:center;gap:7px;background:var(--amber);color:var(--char);font-weight:800;font-size:.9rem;padding:12px 22px;border-radius:var(--r-pill);transition:filter .2s}
.btn-amber:hover{filter:brightness(1.08)}
.btn-ember{display:inline-flex;align-items:center;gap:7px;background:var(--ember);color:#fff;font-weight:700;font-size:.9rem;padding:12px 22px;border-radius:var(--r-pill)}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.4);color:#fff;font-weight:600;font-size:.9rem;padding:12px 22px;border-radius:var(--r-pill)}
.btn-wa{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;font-weight:700;font-size:.9rem;padding:12px 22px;border-radius:var(--r-pill)}
@media(max-width:640px){
  .gh-hero{flex-direction:column;align-items:stretch;min-height:auto}
  .gh-hero-bg{position:relative;height:52vw;min-height:220px;flex-shrink:0}
  .gh-overlay{background:linear-gradient(to bottom,rgba(34,26,20,.3),rgba(34,26,20,.6))}
  .gh-hero-text{background:var(--char);padding:2rem 1.5rem 2.5rem}
}
.sec{padding:66px 0}
.wrap{max-width:1140px;margin:0 auto;padding:0 26px}
.sec-head{text-align:center;max-width:600px;margin:0 auto 44px}
.sec-head h2{font-size:clamp(1.9rem,4vw,2.6rem);margin-top:8px}
.sec-head p{color:var(--ink2);margin-top:10px;font-size:.94rem}
.cat-tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:32px;justify-content:center}
.cat-tab{background:var(--paper);border:1.5px solid var(--line);border-radius:var(--r-pill);padding:8px 18px;font-size:.87rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s,color .15s;font-family:inherit}
.cat-tab.on{background:var(--char);color:#fff;border-color:var(--char)}
.cat-tab:hover:not(.on){border-color:var(--ember);color:var(--ember)}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:900px){.menu-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.menu-grid{grid-template-columns:1fr}}
.dish{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);transition:transform .28s,box-shadow .28s}
.dish:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.dish-photo{aspect-ratio:4/3;overflow:hidden;background:linear-gradient(135deg,rgba(210,84,31,.15),rgba(224,161,46,.2));display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.dish-photo img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.dish:hover .dish-photo img{transform:scale(1.06)}
.dish-body{padding:18px;flex:1;display:flex;flex-direction:column}
.dish-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.dish-name{font-family:"Plus Jakarta Sans",sans-serif;font-size:1.02rem;font-weight:700;line-height:1.3}
.dish-price{color:var(--ember);font-weight:800;font-size:1.02rem;white-space:nowrap;flex-shrink:0}
.dish-desc{font-size:.86rem;color:var(--ink2);margin:7px 0 14px;flex:1;line-height:1.55}
.dish-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;gap:8px}
.dish-tag{font-size:.72rem;background:#FBF1DE;color:#92580A;padding:3px 9px;border-radius:6px;font-weight:600}
.dish-note{font-size:.82rem;color:var(--ink2)}
.add-btn{background:var(--char);color:#fff;font-weight:700;font-size:.8rem;padding:8px 15px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:5px;transition:background .2s,transform .15s;border:none;cursor:pointer;font-family:inherit;flex-shrink:0}
.add-btn:hover{background:var(--ember);transform:translateY(-1px)}
.band{background:var(--char);color:#fff;text-align:center;padding:64px 26px}
.band h2{color:#fff;font-size:clamp(1.9rem,4vw,2.6rem)}
.band p{color:rgba(255,255,255,.72);margin:14px auto 0;max-width:46ch;line-height:1.7}
.band-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:20px}
.team-card{background:var(--paper);border-radius:var(--r-card);overflow:hidden;text-align:center;box-shadow:var(--shadow-sm);transition:transform .28s,box-shadow .28s}
.team-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.team-photo{aspect-ratio:3/4;overflow:hidden;background:linear-gradient(135deg,rgba(210,84,31,.2),rgba(224,161,46,.25));display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.team-photo img{width:100%;height:100%;object-fit:cover}
.team-name{font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:.98rem;padding:12px 12px 2px}
.team-role{color:var(--ember);font-weight:600;font-size:.78rem;padding:0 12px 14px}
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
.gallery-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:var(--r-card);cursor:pointer;transition:transform .25s,box-shadow .25s}
.gallery-grid img:hover{transform:scale(1.03);box-shadow:var(--shadow-md)}
.testi-wrap{background:#fff8ef;padding:66px 26px}
.testi-card{background:var(--paper);border-radius:var(--r-card);padding:2.25rem;position:relative;box-shadow:var(--shadow-sm);max-width:700px;margin:0 auto}
.testi-quote{font-size:3.5rem;line-height:1;color:var(--ember);opacity:.18;font-family:Georgia,serif;position:absolute;top:.75rem;left:1.5rem}
.testi-text{font-size:1rem;line-height:1.75;padding-top:1.5rem;color:var(--ink)}
.testi-author{display:flex;align-items:center;gap:.75rem;margin-top:1.5rem}
.testi-avatar{width:44px;height:44px;border-radius:50%;background:var(--ember);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
.testi-name{font-weight:700;font-size:.92rem}
.testi-role{font-size:.78rem;color:var(--ink2);margin-top:.1rem}
.testi-dots{display:flex;gap:.5rem;justify-content:center;margin-top:1.5rem}
.testi-dot{width:8px;height:8px;border-radius:50%;background:var(--ember);opacity:.25;cursor:pointer;transition:opacity .2s,transform .2s}
.testi-dot.on{opacity:1;transform:scale(1.3)}
.hours-wrap{background:var(--char);color:#fff;padding:64px 26px}
.hours-wrap h2{color:#fff;text-align:center;margin-bottom:2rem;font-size:clamp(1.9rem,4vw,2.6rem)}
.hours-inner{max-width:520px;margin:0 auto;border:1px solid rgba(255,255,255,.12);border-radius:var(--r-card);padding:.5rem}
.hours-badge-wrap{text-align:center;padding:.75rem 0}
.hours-row{display:flex;justify-content:space-between;align-items:center;padding:.65rem .9rem;border-radius:8px;font-size:.9rem}
.hours-row.today{background:rgba(255,255,255,.12);font-weight:700}
.hours-row .day,.hours-row .time{opacity:.75}
.hours-row.today .day,.hours-row.today .time{opacity:1}
.today-pill{font-size:.68rem;background:var(--ember);color:#fff;padding:.1rem .45rem;border-radius:var(--r-pill);margin-left:.4rem;vertical-align:middle}
.badge-open,.badge-closed{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;padding:.25rem .85rem;border-radius:var(--r-pill)}
.badge-open{background:#d1fae5;color:#065f46}
.badge-closed{background:#fee2e2;color:#991b1b}
.badge-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-open .badge-dot{animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.contact-wrap{background:var(--cream);padding:66px 26px}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1.25rem;max-width:860px;margin:0 auto 2rem}
.contact-card{background:var(--paper);border-radius:var(--r-card);padding:1.6rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow-sm);text-decoration:none;color:inherit;transition:transform .2s,box-shadow .2s}
.contact-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.contact-icon{width:46px;height:46px;border-radius:12px;background:var(--ember);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
.contact-label{font-weight:700;font-size:.9rem}
.contact-val{font-size:.83rem;color:var(--ink2);margin-top:.15rem;line-height:1.4}
.contact-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.map-wrap{max-width:860px;margin:2rem auto 0;border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow-sm)}
.map-wrap iframe{width:100%;height:320px;border:0;display:block}
footer{background:#16100B;color:rgba(255,255,255,.6);padding:40px 26px;font-size:.88rem}
.foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;max-width:1140px;margin:0 auto;align-items:center}
.foot-logo{font-family:"Playfair Display",serif;font-weight:800;font-size:1.25rem;color:#fff}
.foot-logo b{color:var(--amber)}
.wa-fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:900;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.45);opacity:0;transform:scale(.8);transition:opacity .3s,transform .3s;pointer-events:none}
.wa-fab.visible{opacity:1;transform:scale(1);pointer-events:auto}
.wa-fab-pulse{position:absolute;inset:0;border-radius:50%;border:2px solid #25D366;animation:fabpulse 2s infinite}
@keyframes fabpulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.8);opacity:0}}
.order-fab{position:fixed;bottom:1.5rem;left:1.5rem;z-index:950;background:var(--char);color:#fff;border-radius:var(--r-pill);padding:.75rem 1.35rem;display:none;align-items:center;gap:.6rem;font-weight:700;font-size:.87rem;box-shadow:0 8px 24px rgba(34,26,20,.4);cursor:pointer;transition:transform .2s;border:none;font-family:inherit}
.order-fab:hover{transform:translateY(-2px)}
.order-count{background:var(--ember);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800}
.order-panel{position:fixed;bottom:0;right:0;z-index:1100;width:min(380px,100%);max-height:80vh;background:#fff;border-radius:var(--r-card) 0 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.18);transform:translateY(110%);transition:transform .35s ease;display:flex;flex-direction:column}
.order-panel.open{transform:translateY(0)}
.order-hdr{background:linear-gradient(135deg,var(--char),#3a2a1a);color:#fff;padding:1rem 1.35rem;display:flex;justify-content:space-between;align-items:center;font-weight:700;border-radius:var(--r-card) 0 0 0}
.order-hdr button{color:#fff;background:rgba(255,255,255,.15);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;border:none;cursor:pointer}
.order-items{padding:1rem 1.35rem;overflow-y:auto;flex:1}
.order-row{display:flex;justify-content:space-between;align-items:center;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--line)}
.order-row-name{font-weight:600;font-size:.84rem;flex:1}
.order-qty{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.order-qty button{width:22px;height:22px;border-radius:50%;border:1px solid var(--line);font-weight:700;font-size:.8rem;cursor:pointer;background:#fff}
.order-empty{text-align:center;opacity:.4;padding:2rem 0;font-size:.84rem}
.order-total{padding:.8rem 1.35rem;font-weight:800;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:.9rem}
.order-actions{padding:.85rem 1.35rem 1.35rem;display:flex;gap:.6rem}
.order-clear{flex-shrink:0;font-size:.76rem;opacity:.6;background:#f5f0e8;border-radius:var(--r-pill);padding:.5rem .9rem;border:none;cursor:pointer;font-family:inherit}
.order-send{flex:1;text-align:center;background:#25D366;color:#fff;border-radius:var(--r-pill);padding:.65rem 1rem;font-weight:700;font-size:.84rem;text-decoration:none;display:block}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.reveal.in{opacity:1;transform:none}
.preview-banner{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#1a1a2e,#e94560);color:#fff;text-align:center;padding:.75rem 1rem;font-size:.84rem;font-weight:600}
.preview-banner a{color:#fff;text-decoration:underline}
</style>
</head>
<body>
<!-- PREVIEW -->
<!--WCZ:preview_banner-->

<!-- NAV -->
<header>
  <div class="nav">
    <!--WCZ:logo-->
    <nav class="nav-links">
      <a href="#menu">Menu</a>
      <!--WCZ:nav_team-->
      <!--WCZ:nav_hours-->
      <a href="#contact">Visit us</a>
    </nav>
    <a href="<!--WCZ:wa_order-->" class="nav-cta" target="_blank" rel="noopener">Order online</a>
    <div class="hamburger" id="gh-hamburger"><span></span><span></span><span></span></div>
  </div>
</header>
<div class="mob-menu" id="gh-mob-menu">
  <span class="mob-close" id="gh-mob-close">&#x2715;</span>
  <a href="#menu">Menu</a>
  <!--WCZ:nav_team-->
  <a href="#contact">Visit us</a>
  <a href="<!--WCZ:wa_order-->" class="btn-wa" target="_blank">Order on WhatsApp</a>
</div>

<!-- HERO -->
<section class="gh-hero">
  <div class="gh-hero-bg"><!--WCZ:hero_img--><div class="gh-overlay"></div></div>
  <div class="gh-hero-text">
    <!--WCZ:open_badge-->
    <span class="eyebrow"><!--WCZ:type_label--></span>
    <h1><!--WCZ:tagline--></h1>
    <p><!--WCZ:about--></p>
    <div class="hero-btns">
      <a href="#menu" class="btn-amber">View Menu</a>
      <a href="<!--WCZ:wa_order-->" class="btn-wa" target="_blank" rel="noopener">Order on WhatsApp</a>
      <a href="#contact" class="btn-ghost">Find us</a>
    </div>
  </div>
</section>

<!-- MENU -->
<!--WCZ:menu_section-->

<!-- ORDER CTA -->
<section class="band" id="order">
  <div class="wrap">
    <h2>Hungry? Order in two taps.</h2>
    <p>Build your order, then send it straight to our kitchen on WhatsApp.</p>
    <div class="band-btns">
      <a href="<!--WCZ:wa_order-->" class="btn-wa" target="_blank" rel="noopener">&#x1F4AC; Order on WhatsApp</a>
      <a href="#menu" class="btn-ghost">Back to menu</a>
    </div>
  </div>
</section>

<!-- TEAM -->
<!--WCZ:team_section-->

<!-- GALLERY -->
<!--WCZ:gallery_section-->

<!-- TESTIMONIALS -->
<!--WCZ:testi_section-->

<!-- HOURS -->
<!--WCZ:hours_section-->

<!-- CONTACT -->
<section class="contact-wrap" id="contact">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="eyebrow">Visit us</span>
      <h2>Come find us</h2>
    </div>
    <div class="contact-grid reveal"><!--WCZ:contact_cards--></div>
    <div class="contact-actions"><!--WCZ:contact_actions--></div>
    <!--WCZ:map_embed-->
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="foot">
    <div><!--WCZ:foot_logo--><p style="margin-top:6px;opacity:.55;font-size:.85rem"><!--WCZ:foot_location--></p></div>
    <div>&copy; <!--WCZ:year--> <!--WCZ:biz_name--> &middot; <a href="https://websites.co.zw" style="color:rgba(255,255,255,.4)">Built with websites.co.zw</a></div>
  </div>
</footer>

<!-- WA FAB -->
<!--WCZ:wa_fab-->

<!-- ORDER FAB + PANEL -->
<!--WCZ:order_fab-->

<script>
(function(){
  var fab=document.getElementById('wa-fab');
  window.addEventListener('scroll',function(){if(fab)fab.classList.toggle('visible',window.scrollY>300);},{passive:true});
  var btn=document.getElementById('gh-hamburger'),menu=document.getElementById('gh-mob-menu'),cl=document.getElementById('gh-mob-close');
  if(btn&&menu){btn.addEventListener('click',function(){menu.classList.add('open');});if(cl)cl.addEventListener('click',function(){menu.classList.remove('open');});menu.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){menu.classList.remove('open');});});}
  var rvl=document.querySelectorAll('.reveal');
  if(rvl.length){var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add('in');obs.unobserve(x.target);}});},{threshold:.1});rvl.forEach(function(el){obs.observe(el);});}
  var tabs=document.querySelectorAll('.cat-tab'),cats=document.querySelectorAll('.menu-cat');
  tabs.forEach(function(tab){tab.addEventListener('click',function(){var cat=tab.dataset.cat;tabs.forEach(function(t){t.classList.toggle('on',t.dataset.cat===cat);});cats.forEach(function(c){c.style.display=c.dataset.cat===cat?'block':'none';});});});
  var cards=document.querySelectorAll('.testi-card'),dotsEl=document.getElementById('testi-dots');
  if(cards.length&&dotsEl){var cur=0;cards.forEach(function(c,i){if(i>0)c.style.display='none';});dotsEl.innerHTML=Array.from(cards).map(function(_,i){return '<span class="testi-dot'+(i===0?' on':'')+'" data-i="'+i+'"></span>';}).join('');dotsEl.querySelectorAll('.testi-dot').forEach(function(d){d.addEventListener('click',function(){cards[cur].style.display='none';cur=parseInt(d.dataset.i);cards[cur].style.display='block';dotsEl.querySelectorAll('.testi-dot').forEach(function(x){x.classList.toggle('on',x.dataset.i==cur);});});});if(cards.length>1)setInterval(function(){cards[cur].style.display='none';cur=(cur+1)%cards.length;cards[cur].style.display='block';dotsEl.querySelectorAll('.testi-dot').forEach(function(x){x.classList.toggle('on',x.dataset.i==cur);});},5000);}
})();
(function(){
  var _o=[],waNum='<!--WCZ:wa_num-->';
  function pP(p){if(!p)return null;var m=String(p).match(/[\d.,]+/);return m?parseFloat(m[0].replace(/,/g,'')):null;}
  function cS(p){var m=String(p||'').match(/^[^\d\s]+/);return m?m[0]:'';}
  function render(){
    var iEl=document.getElementById('order-items'),cEl=document.getElementById('order-count'),tEl=document.getElementById('order-total'),sEl=document.getElementById('order-send');
    if(!iEl)return;
    var cnt=_o.reduce(function(a,b){return a+b.qty;},0);
    if(cEl)cEl.textContent=cnt;
    if(!_o.length){iEl.innerHTML='<div class="order-empty">Your order is empty.<br>Tap + Add to order on any dish.</div>';if(tEl)tEl.style.display='none';return;}
    iEl.innerHTML=_o.map(function(i,idx){return '<div class="order-row"><span class="order-row-name">'+i.name+(i.price?' \u2014 '+i.price:'')+'</span><span class="order-qty"><button onclick="ghQ('+idx+',-1)">\u2212</button><span>'+i.qty+'</span><button onclick="ghQ('+idx+',1)">+</button></span></div>';}).join('');
    var allN=_o.every(function(i){return pP(i.price)!==null;});
    if(allN&&tEl){var sym=cS(_o[0].price);var tot=_o.reduce(function(a,i){return a+(pP(i.price)*i.qty);},0);tEl.style.display='flex';tEl.innerHTML='<span>Estimated total</span><span>'+sym+tot.toFixed(2)+'</span>';}else if(tEl)tEl.style.display='none';
    if(sEl&&waNum){var msg='Hello, I would like to place an order:\n'+_o.map(function(i){return '- '+i.name+' x'+i.qty+(i.price?' ('+i.price+')':'');}).join('\n');sEl.href='https://wa.me/'+waNum+'?text='+encodeURIComponent(msg);}
  }
  window.ghAdd=function(item){var ex=_o.find(function(i){return i.name===item.name;});if(ex){ex.qty++;}else{_o.push({name:item.name,price:item.price,qty:1});}render();var fab=document.getElementById('order-fab');if(fab)fab.style.display='flex';if(window.event&&window.event.target){var btn=window.event.target;var orig=btn.textContent;btn.textContent='Added \u2713';btn.style.background='#1a6b3c';setTimeout(function(){btn.textContent=orig;btn.style.background='';},1500);}};
  window.ghToggle=function(){var p=document.getElementById('order-panel');if(p)p.classList.toggle('open');};
  window.ghClear=function(){_o=[];render();var fab=document.getElementById('order-fab');var p=document.getElementById('order-panel');if(fab)fab.style.display='none';if(p)p.classList.remove('open');};
  window.ghQ=function(idx,d){if(!_o[idx])return;_o[idx].qty+=d;if(_o[idx].qty<=0)_o.splice(idx,1);render();if(!_o.length){var fab=document.getElementById('order-fab');if(fab)fab.style.display='none';}};
  render();
})();
</script>
</body>
