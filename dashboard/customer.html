<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>My Dashboard — websites.co.zw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#15924B;--green-dk:#0f6e39;--green-bg:#e8f5ee;
  --gold:#a87d1a;--gold-dk:#876312;--gold-bg:#fdf3dc;
  --red:#c0392b;--red-bg:#fdecea;
  --pro:#7c3aed;--pro-bg:#f3eeff;
  --ink:#0d0f14;--ink2:#3d4251;--ink3:#6b7180;
  --surface:#f0f2f6;--card:#fff;
  --line:#e2e5eb;--line2:#d0d4dc;
  --r:14px;--r-sm:9px;--r-xs:6px;
  --shadow:0 1px 3px rgba(13,15,20,.06),0 6px 20px rgba(13,15,20,.07);
  --shadow-lg:0 4px 8px rgba(13,15,20,.08),0 16px 40px rgba(13,15,20,.12);
  --font-head:"Archivo",system-ui,sans-serif;
  --font-body:"Hanken Grotesk",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--surface);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}

/* ── TOPBAR ── */
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:0 18px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--font-head);font-weight:800;font-size:17px;letter-spacing:-.02em;display:flex;align-items:center;gap:2px}
.logo-tld{color:var(--green)}
.logo-flag{display:inline-flex;flex-direction:column;gap:2px;margin-left:5px}
.logo-flag i{display:block;width:3px;height:3px;border-radius:50%}
.logo-flag i:nth-child(1){background:var(--green)}
.logo-flag i:nth-child(2){background:var(--gold)}
.logo-flag i:nth-child(3){background:var(--red)}
.topbar-right{display:flex;align-items:center;gap:10px}
.owner-name{font-size:13px;font-weight:600;color:var(--ink2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--r-sm);font-weight:600;font-size:13px;padding:8px 15px;transition:.15s;border:1.5px solid transparent;white-space:nowrap;cursor:pointer}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:var(--green-dk)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--line2)}
.btn-ghost:hover{border-color:var(--ink3);color:var(--ink)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:var(--gold-dk)}
.btn-pro{background:var(--pro-bg);color:var(--pro);border-color:var(--pro-bg)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11.5px}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bg)}
.btn-red:hover{background:#fad4d0}

/* ── PAGE WRAPPER ── */
.page{max-width:860px;margin:0 auto;padding:24px 18px 60px}
@media(min-width:700px){.page{padding:32px 24px 60px}}

/* ── AUTH SCREENS ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:32px 28px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-logo{font-family:var(--font-head);font-weight:800;font-size:22px;letter-spacing:-.02em;margin-bottom:18px;display:flex;align-items:center;gap:2px}
.auth-logo span{color:var(--green)}
.auth-title{font-family:var(--font-head);font-size:20px;font-weight:800;margin-bottom:6px}
.auth-sub{font-size:13.5px;color:var(--ink3);margin-bottom:22px;line-height:1.5}
.fld-label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.fld-input{width:100%;border:1.5px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font-size:15px;color:var(--ink);background:#fff;transition:border-color .15s}
.fld-input:focus{outline:none;border-color:var(--green)}
.fld-input::placeholder{color:#b0b6c3}
.fld-group{margin-bottom:14px}
.channel-row{display:flex;gap:8px;margin-bottom:14px}
.channel-btn{flex:1;border:1.5px solid var(--line2);border-radius:var(--r-sm);padding:9px 8px;font-size:13px;font-weight:600;color:var(--ink2);text-align:center;transition:.15s;background:#fff;cursor:pointer}
.channel-btn.active{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.auth-msg{font-size:13px;padding:10px 12px;border-radius:var(--r-xs);margin-bottom:12px;display:none}
.auth-msg.err{background:var(--red-bg);color:var(--red);display:block}
.auth-msg.ok{background:var(--green-bg);color:var(--green-dk);display:block}
.auth-hint{font-size:12px;color:var(--ink3);margin-top:14px;text-align:center;line-height:1.5}
.auth-hint a{color:var(--green);font-weight:600;cursor:pointer}
.otp-input{width:100%;border:2px solid var(--line);border-radius:var(--r-sm);padding:14px;font-size:26px;font-weight:700;text-align:center;letter-spacing:.25em;color:var(--ink);font-family:var(--font-head);background:#fff;transition:border-color .15s}
.otp-input:focus{outline:none;border-color:var(--green)}
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:12px}
.spinner{width:20px;height:20px;border:2.5px solid var(--line2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DASHBOARD HEADER ── */
.dash-header{margin-bottom:24px}
.dash-greeting{font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:4px}
.dash-sub{font-size:13.5px;color:var(--ink3)}
.dash-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ── SITE CARDS ── */
.sites-grid{display:flex;flex-direction:column;gap:14px}
.site-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s}
.site-card:hover{box-shadow:var(--shadow-lg)}
.site-card-top{padding:16px 18px;display:flex;align-items:flex-start;gap:14px}
.site-thumb{width:56px;height:56px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;font-family:var(--font-head);letter-spacing:-.04em}
.site-thumb.tpl-bold-retail{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.site-thumb.tpl-grill-house{background:linear-gradient(135deg,#2d1200,#7a2e00)}
.site-thumb.tpl-beauty-salon{background:linear-gradient(135deg,#3d0030,#8b005d)}
.site-thumb.tpl-school-institution{background:linear-gradient(135deg,#0a1628,#1a3a6b)}
.site-thumb.tpl-advisory-firm{background:linear-gradient(135deg,#1a1400,#4a3800)}
.site-thumb.tpl-property-estate{background:linear-gradient(135deg,#0a1f0a,#1a4a1a)}
.site-thumb.tpl-boutique-fashion{background:linear-gradient(135deg,#1a0010,#3d0025)}
.site-thumb.tpl-grocery-fmcg{background:linear-gradient(135deg,#0a2a0a,#1a5a1a)}
.site-thumb.tpl-retail-hardware{background:linear-gradient(135deg,#0d1a2e,#1a3366)}
.site-info{flex:1;min-width:0}
.site-name{font-family:var(--font-head);font-size:16px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.site-url{font-size:12.5px;color:var(--green);font-weight:600;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.site-url a{color:var(--green)}
.site-url a:hover{text-decoration:underline}
.status-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge-draft{background:#f0f2f6;color:var(--ink3)}
.badge-pending{background:var(--gold-bg);color:var(--gold-dk)}
.badge-published{background:var(--green-bg);color:var(--green)}
.badge-grace{background:#fef3c7;color:#92400e}
.badge-suspended{background:var(--red-bg);color:var(--red)}
.badge-tpl{background:var(--surface);color:var(--ink3);font-size:11px}
.badge-plan{background:var(--pro-bg);color:var(--pro)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.8}
.site-card-actions{padding:10px 18px 14px;display:flex;gap:7px;flex-wrap:wrap;border-top:1px solid var(--line)}
.site-expires{font-size:12px;color:var(--ink3);padding:6px 18px 10px;display:flex;align-items:center;gap:5px}
.site-expires.soon{color:var(--gold-dk)}
.site-expires.urgent{color:var(--red)}

/* ── EMPTY STATE ── */
.empty-state{background:var(--card);border:1.5px dashed var(--line2);border-radius:var(--r);padding:48px 28px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-title{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:13.5px;color:var(--ink3);line-height:1.6;margin-bottom:22px;max-width:360px;margin-left:auto;margin-right:auto}

/* ── UPGRADE BANNER ── */
.upgrade-banner{background:linear-gradient(135deg,#1a0a2e 0%,#3d1a6b 100%);border-radius:var(--r);padding:20px 22px;display:flex;align-items:flex-start;gap:14px;color:#fff;margin-bottom:20px}
.upgrade-banner-icon{font-size:28px;flex-shrink:0}
.upgrade-banner h3{font-family:var(--font-head);font-size:16px;font-weight:800;margin-bottom:4px}
.upgrade-banner p{font-size:13px;color:rgba(255,255,255,.8);line-height:1.5;margin-bottom:12px}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
@media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;text-align:center}
.stat-card-val{font-family:var(--font-head);font-size:24px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-card-lbl{font-size:11.5px;color:var(--ink3);font-weight:600}

/* ── LOADING ── */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.loading-logo{font-family:var(--font-head);font-weight:800;font-size:24px;letter-spacing:-.02em;color:var(--ink)}
.loading-logo span{color:var(--green)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,20,.55);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r);width:100%;max-width:480px;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-family:var(--font-head);font-size:16px;font-weight:700}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:#fff;border-radius:22px;padding:9px 18px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--line);margin:16px 0}

/* ── PLAN CARDS ── */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.plan-grid{grid-template-columns:1fr}}
.plan-card{border:2px solid var(--line);border-radius:var(--r-sm);padding:16px}
.plan-card.highlighted{border-color:var(--green)}
.plan-card.highlighted-pro{border-color:var(--pro)}
.plan-name{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-bottom:5px}
.plan-card.highlighted-pro .plan-name{color:var(--pro)}
.plan-price{font-family:var(--font-head);font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.plan-period{font-size:12px;font-weight:400;color:var(--ink3)}
.plan-desc{font-size:12px;color:var(--ink3);margin-bottom:12px}
.plan-features{font-size:12.5px;color:var(--ink2);display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.plan-features div::before{content:"✓ "}

/* ── RENEW NOTICE ── */
.renew-notice{background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:var(--r-sm);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-top:10px}
.renew-notice.urgent{background:var(--red-bg);border-color:var(--red)}
.renew-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.renew-body{flex:1}
.renew-body strong{font-size:13px;font-weight:700;color:var(--gold-dk);display:block;margin-bottom:3px}
.renew-notice.urgent .renew-body strong{color:var(--red)}
.renew-body p{font-size:12px;color:var(--ink2);line-height:1.45}
</style>
</head>
<body>

<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-overlay" id="publishModal" onclick="closePublishModal(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>Publish your site</h2>
      <button class="btn btn-ghost btn-sm" onclick="closePublishModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="publishModalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closePublishModalDirect()">Cancel</button>
      <button class="btn btn-green" id="publishConfirmBtn" onclick="confirmPublish()">Pay & Publish — $30/yr</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

var AUTH    = "https://app.websites.co.zw";
var API     = "https://app.websites.co.zw";
var EDITOR  = "/editor/index.html";
var PREVIEW = "https://app.websites.co.zw/preview/";

var TPL_NAMES = {
  "bold-retail":        "General Business",
  "grill-house":        "Restaurant & Food",
  "beauty-salon":       "Beauty & Wellness",
  "school-institution": "School & Academy",
  "advisory-firm":      "Consultant & Legal",
  "property-estate":    "Real Estate",
  "boutique-fashion":   "Fashion & Boutique",
  "grocery-fmcg":       "Grocery & Spaza",
  "retail-hardware":    "Hardware & Retail",
};

var state = {
  owner: null,
  sites: [],
  loading: true,
  step: "phone",    // phone | otp
  phone: "",
  channel: "whatsapp",
  publishingSiteId: null,
};

var app = document.getElementById("app");

// ── UTILS ────────────────────────────────────────────────
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function el(html){ var d=document.createElement("div"); d.innerHTML=html; return d.firstElementChild; }
function q(id){ return document.getElementById(id); }
function toast(msg,type){
  var wrap=q("toastWrap"),t=document.createElement("div");
  t.className="toast"+(type?" "+type:""); t.textContent=msg; wrap.appendChild(t);
  requestAnimationFrame(function(){t.classList.add("show");});
  setTimeout(function(){t.classList.remove("show");setTimeout(function(){t.remove();},300);},3200);
}
function daysUntil(epoch){
  if(!epoch) return null;
  return Math.ceil((epoch*1000 - Date.now())/(1000*60*60*24));
}
function fmtDate(epoch){
  if(!epoch) return "";
  return new Date(epoch*1000).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}
function initials(name){
  if(!name) return "W";
  return name.trim().split(/\s+/).map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2);
}

// ── API ──────────────────────────────────────────────────
async function api(path, opts){
  var token = localStorage.getItem("wcz_token");
  var headers = {"Content-Type":"application/json"};
  if(token) headers["Authorization"] = "Bearer "+token;
  var r = await fetch(API+path, Object.assign({headers:headers}, opts||{}));
  var data = {}; try{ data=await r.json(); }catch(e){}
  return {ok:r.ok, status:r.status, data:data};
}

// ── BOOT ─────────────────────────────────────────────────
(async function boot(){
  renderLoading();
  try{
    var r = await api("/api/auth/me", {method:"GET"});
    if(r.ok && r.data && r.data.authenticated){
      state.owner = r.data.owner;
      await loadSites();
      return renderDashboard();
    }
    localStorage.removeItem("wcz_token");
    renderLogin();
  }catch(e){
    renderLogin();
  }
})();

async function loadSites(){
  var r = await api("/api/sites");
  if(r.ok && r.data && Array.isArray(r.data.sites)){
    state.sites = r.data.sites;
  }
}

// ── LOADING ──────────────────────────────────────────────
function renderLoading(){
  app.innerHTML =
    '<div class="loading-screen">'+
      '<div class="loading-logo">websites<span>.co.zw</span></div>'+
      '<div class="spinner"></div>'+
    '</div>';
}

// ── LOGIN ─────────────────────────────────────────────────
function renderLogin(){
  app.innerHTML = "";
  var wrap = el('<div class="auth-wrap"></div>');
  var card = el(
    '<div class="auth-card">'+
      '<div class="auth-logo">websites<span>.co.zw</span></div>'+
      '<div class="auth-title">Manage your site</div>'+
      '<p class="auth-sub">Sign in with your phone number to view and update your website.</p>'+
      '<div id="auth-msg" class="auth-msg"></div>'+
      '<div id="auth-step"></div>'+
    '</div>'
  );
  wrap.appendChild(card);
  app.appendChild(wrap);
  renderPhoneStep();
}

function setMsg(text, type){
  var m=q("auth-msg"); if(!m) return;
  m.className="auth-msg"+(type?" "+type:"");
  m.textContent=text||"";
  m.style.display=text?"block":"none";
}

function renderPhoneStep(){
  state.step="phone";
  var s=q("auth-step"); if(!s) return;
  s.innerHTML=
    '<div class="fld-group"><label class="fld-label" for="inp-phone">Phone number</label>'+
    '<input class="fld-input" id="inp-phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="077 123 4567" value="'+esc(state.phone)+'"></div>'+
    '<div class="fld-group"><label class="fld-label">Send code via</label>'+
    '<div class="channel-row">'+
      '<button type="button" class="channel-btn'+(state.channel==="whatsapp"?" active":"")+'\" id="ch-wa" onclick="setChannel(\'whatsapp\')">💬 WhatsApp</button>'+
      '<button type="button" class="channel-btn'+(state.channel==="email"?" active":"")+'\" id="ch-em" onclick="setChannel(\'email\')">📧 Email</button>'+
    '</div></div>'+
    '<div class="fld-group" id="email-wrap" style="'+(state.channel==="email"?"":"display:none")+'">'+
    '<label class="fld-label" for="inp-email">Email address</label>'+
    '<input class="fld-input" id="inp-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com"></div>'+
    '<button class="btn btn-green" style="width:100%;margin-top:4px" onclick="requestOtp()">Send code →</button>'+
    '<p class="auth-hint">New here? We\'ll create your account automatically.</p>';

  var ph=q("inp-phone");
  if(ph){ ph.focus(); ph.addEventListener("keydown",function(e){if(e.key==="Enter")requestOtp();}); }
}

window.setChannel=function(ch){
  state.channel=ch;
  var ew=q("email-wrap");
  if(ew)ew.style.display=ch==="email"?"":"none";
  ["wa","em"].forEach(function(x){
    var b=q("ch-"+x); if(b)b.classList.remove("active");
  });
  var active=q("ch-"+(ch==="whatsapp"?"wa":"em"));
  if(active)active.classList.add("active");
};

window.requestOtp=async function(){
  var ph=(q("inp-phone")||{}).value||""; ph=ph.trim();
  if(!ph){setMsg("Enter your phone number","err");return;}
  state.phone=ph;
  var body={phone:ph,channel:state.channel};
  if(state.channel==="email"){
    var em=(q("inp-email")||{}).value||""; em=em.trim();
    if(em) body.email=em;
  }
  setMsg("","");
  var btn=q("auth-step").querySelector("button:last-of-type");
  if(btn){btn.disabled=true;btn.textContent="Sending…";}
  try{
    var r=await api("/api/auth/request-otp",{method:"POST",body:JSON.stringify(body)});
    if(r.ok||r.status===200){
      renderOtpStep();
    } else {
      setMsg(friendlyErr(r.data.error||r.data.message),"err");
      if(btn){btn.disabled=false;btn.textContent="Send code →";}
    }
  }catch(e){
    setMsg("Network error — check your connection","err");
    if(btn){btn.disabled=false;btn.textContent="Send code →";}
  }
};

function renderOtpStep(){
  state.step="otp";
  var s=q("auth-step"); if(!s)return;
  var dest=state.channel==="whatsapp"?"WhatsApp":"email";
  s.innerHTML=
    '<p style="font-size:13.5px;color:var(--ink2);margin-bottom:14px;line-height:1.5">'+
    'Enter the 6-digit code sent to your '+dest+'.</p>'+
    '<div class="fld-group">'+
    '<input class="otp-input" id="inp-otp" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="——————">'+
    '</div>'+
    '<button class="btn btn-green" style="width:100%;margin-top:4px" onclick="verifyOtp()">Verify & sign in →</button>'+
    '<p class="auth-hint"><a onclick="renderPhoneStep()">← Use a different number</a>&nbsp;&nbsp;·&nbsp;&nbsp;<a onclick="requestOtp()">Resend code</a></p>';
  setMsg("","");
  var oi=q("inp-otp");
  if(oi){oi.focus();oi.addEventListener("keydown",function(e){if(e.key==="Enter")verifyOtp();});}
}

window.verifyOtp=async function(){
  var code=(q("inp-otp")||{}).value||""; code=code.trim();
  if(!code||code.length<6){setMsg("Enter the 6-digit code","err");return;}
  setMsg("","");
  var btn=q("auth-step").querySelector("button:last-of-type");
  if(btn){btn.disabled=true;btn.textContent="Verifying…";}
  try{
    var r=await api("/api/auth/verify-otp",{method:"POST",body:JSON.stringify({phone:state.phone,code:code})});
    if(r.ok && r.data && r.data.token){
      localStorage.setItem("wcz_token",r.data.token);
      state.owner=r.data.owner;
      renderLoading();
      await loadSites();
      renderDashboard();
    } else {
      setMsg(friendlyErr(r.data.error||r.data.message),"err");
      if(btn){btn.disabled=false;btn.textContent="Verify & sign in →";}
    }
  }catch(e){
    setMsg("Network error — check your connection","err");
    if(btn){btn.disabled=false;btn.textContent="Verify & sign in →";}
  }
};

function friendlyErr(code){
  var m={
    invalid_code:"That code didn't match — try again.",
    code_expired:"That code has expired — request a new one.",
    code_expired_or_missing:"Code expired — request a new one.",
    too_many_attempts:"Too many wrong attempts — request a new code.",
    too_many_requests:"Too many requests — wait a moment and try again.",
    otp_delivery_failed:"Couldn't send the code — try the other channel.",
    email_required:"Enter your email to use email delivery.",
    email_not_on_file:"No email on file — use WhatsApp instead.",
    rate_limited:"Too many requests — wait a moment.",
  };
  return m[code]||code||"Something went wrong — try again.";
}

// ── DASHBOARD ────────────────────────────────────────────
function renderDashboard(){
  var name=(state.owner&&(state.owner.name||state.owner.phone))||"there";
  var sites=state.sites||[];
  var published=sites.filter(function(s){return s.status==="published"||s.status==="grace";}).length;
  var draft=sites.filter(function(s){return s.status==="draft"||s.status==="pending_payment";}).length;

  app.innerHTML=
    '<header class="topbar">'+
      '<div class="logo">websites<span class="logo-tld">.co.zw</span><span class="logo-flag"><i></i><i></i><i></i></span></div>'+
      '<div class="topbar-right">'+
        '<span class="owner-name">'+esc(name)+'</span>'+
        '<button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>'+
      '</div>'+
    '</header>'+
    '<div class="page">'+
      '<div class="dash-header">'+
        '<div class="dash-greeting">Welcome back'+
          (state.owner&&state.owner.name?', '+esc(state.owner.name.split(' ')[0]):'')+'!</div>'+
        '<div class="dash-sub">'+
          (sites.length===0
            ? "You don't have any sites yet — create your first one."
            : published+" live · "+draft+" draft · "+sites.length+" total")+
        '</div>'+
        '<div class="dash-actions">'+
          '<button class="btn btn-green" onclick="newSite()">+ Create new site</button>'+
          '<button class="btn btn-ghost" onclick="refreshSites()">↺ Refresh</button>'+
        '</div>'+
      '</div>'+
      (sites.length>0?renderStatsRow(sites):"")+
      '<div id="sites-container">'+renderSitesList(sites)+'</div>'+
    '</div>';
}

function renderStatsRow(sites){
  var pub=sites.filter(function(s){return s.status==="published"||s.status==="grace";}).length;
  var draft=sites.filter(function(s){return s.status==="draft";}).length;
  var pend=sites.filter(function(s){return s.status==="pending_payment";}).length;
  return '<div class="stats-row">'+
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--green)">'+pub+'</div><div class="stat-card-lbl">Live sites</div></div>'+
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--ink3)">'+draft+'</div><div class="stat-card-lbl">Drafts</div></div>'+
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--gold-dk)">'+pend+'</div><div class="stat-card-lbl">Pending payment</div></div>'+
  '</div>';
}

function renderSitesList(sites){
  if(sites.length===0){
    return '<div class="empty-state">'+
      '<div class="empty-icon">🌐</div>'+
      '<div class="empty-title">No sites yet</div>'+
      '<p class="empty-sub">Create your first website in minutes. Our AI writes all the copy — you just fill in your business details.</p>'+
      '<button class="btn btn-green" onclick="newSite()">Create my first site</button>'+
    '</div>';
  }
  return '<div class="sites-grid">'+sites.map(renderSiteCard).join("")+'</div>';
}

function renderSiteCard(s){
  var tpl=s.template_id||"bold-retail";
  var tplName=TPL_NAMES[tpl]||tpl;
  var init=initials(s.site_name||"W");
  var slug=s.draft_subdomain||"";
  var publicUrl=slug?("https://"+slug+".websites.co.zw"):"";
  var previewUrl=slug?(PREVIEW+encodeURIComponent(slug)):"";
  var daysLeft=daysUntil(s.expires_at);
  var expiresHtml="";
  if(s.status==="published"||s.status==="grace"){
    if(daysLeft!==null && daysLeft<=30){
      var urgency=daysLeft<=7?"urgent":"soon";
      expiresHtml='<div class="site-expires '+urgency+'">'+
        (daysLeft<=0?"⚠ Expired":"⏰ Expires "+fmtDate(s.expires_at)+" ("+Math.max(0,daysLeft)+" days)")+
      '</div>';
    }
  }
  var statusBadge="";
  if(s.status==="published") statusBadge='<span class="badge badge-published"><span class="badge-dot"></span>Live</span>';
  else if(s.status==="pending_payment") statusBadge='<span class="badge badge-pending"><span class="badge-dot"></span>Awaiting payment</span>';
  else if(s.status==="grace") statusBadge='<span class="badge badge-grace"><span class="badge-dot"></span>Grace period</span>';
  else if(s.status==="suspended") statusBadge='<span class="badge badge-suspended"><span class="badge-dot"></span>Suspended</span>';
  else statusBadge='<span class="badge badge-draft"><span class="badge-dot"></span>Draft</span>';

  var planBadge=s.plan==="pro"?'<span class="badge badge-plan">Pro ⭐</span>':"";

  // Actions
  var actions=[];
  actions.push('<button class="btn btn-green btn-sm" onclick="editSite(\''+esc(s.id)+'\')">✏️ Edit</button>');
  if(previewUrl) actions.push('<button class="btn btn-ghost btn-sm" onclick="previewSite(\''+esc(slug)+'\')">👁 Preview</button>');
  if(s.status==="published"||s.status==="grace"){
    if(publicUrl) actions.push('<a class="btn btn-ghost btn-sm" href="'+esc(publicUrl)+'" target="_blank" rel="noopener">🔗 View live ↗</a>');
    if(daysLeft!==null && daysLeft<=60){
      actions.push('<button class="btn btn-gold btn-sm" onclick="renewSite(\''+esc(s.id)+'\')">↺ Renew</button>');
    }
  } else if(s.status==="draft"||s.status==="pending_payment"){
    actions.push('<button class="btn btn-gold btn-sm" onclick="publishSite(\''+esc(s.id)+'\')">🚀 Publish</button>');
  } else if(s.status==="suspended"){
    actions.push('<button class="btn btn-gold btn-sm" onclick="renewSite(\''+esc(s.id)+'\')">↺ Reactivate</button>');
  }

  var renewNotice="";
  if(s.status==="grace"){
    renewNotice='<div class="renew-notice">'+
      '<div class="renew-icon">⏰</div>'+
      '<div class="renew-body"><strong>Subscription ending</strong>'+
      '<p>Your site expires '+fmtDate(s.expires_at)+'. Renew now to keep it live.</p></div>'+
    '</div>';
  } else if(s.status==="suspended"){
    renewNotice='<div class="renew-notice urgent">'+
      '<div class="renew-icon">⚠️</div>'+
      '<div class="renew-body"><strong>Site suspended</strong>'+
      '<p>Reactivate to bring your site back online.</p></div>'+
    '</div>';
  }

  return '<div class="site-card">'+
    '<div class="site-card-top">'+
      '<div class="site-thumb tpl-'+esc(tpl)+'">'+esc(init)+'</div>'+
      '<div class="site-info">'+
        '<div class="site-name">'+esc(s.site_name||"Untitled site")+'</div>'+
        '<div class="site-url">'+
          (publicUrl&&(s.status==="published"||s.status==="grace")
            ?'<a href="'+esc(publicUrl)+'" target="_blank" rel="noopener">'+esc(slug)+'.websites.co.zw ↗</a>'
            :(slug?esc(slug)+'.websites.co.zw':"No URL yet"))+
        '</div>'+
        '<div class="status-row">'+statusBadge+planBadge+'<span class="badge badge-tpl">'+esc(tplName)+'</span></div>'+
        renewNotice+
      '</div>'+
    '</div>'+
    expiresHtml+
    '<div class="site-card-actions">'+actions.join("")+'</div>'+
  '</div>';
}

// ── SITE ACTIONS ─────────────────────────────────────────
window.newSite=function(){
  // Check if owner already has a non-suspended site (one_site_limit)
  var activeSite=state.sites.find(function(s){return s.status!=="suspended";});
  if(activeSite){
    toast("You already have a site — edit it from your dashboard","err");
    return;
  }
  location.href=EDITOR;
};

window.editSite=function(id){
  location.href=EDITOR+"?site="+encodeURIComponent(id);
};

window.previewSite=function(slug){
  window.open(PREVIEW+encodeURIComponent(slug),"_blank");
};

window.signOut=async function(){
  try{ await api("/api/auth/logout",{method:"POST"}); }catch(e){}
  localStorage.removeItem("wcz_token");
  state.owner=null; state.sites=[];
  renderLogin();
};

window.refreshSites=async function(){
  var container=q("sites-container");
  if(container) container.innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
  await loadSites();
  var sc=q("sites-container");
  if(sc) sc.innerHTML=renderSitesList(state.sites);
  // Also refresh stats
  var statsWrap=document.querySelector(".stats-row");
  if(statsWrap&&state.sites.length>0) statsWrap.outerHTML=renderStatsRow(state.sites);
  var sub=document.querySelector(".dash-sub");
  if(sub){
    var pub=state.sites.filter(function(s){return s.status==="published"||s.status==="grace";}).length;
    var dft=state.sites.filter(function(s){return s.status==="draft"||s.status==="pending_payment";}).length;
    sub.textContent=state.sites.length===0?"You don't have any sites yet.":(pub+" live · "+dft+" draft · "+state.sites.length+" total");
  }
  toast("Refreshed","ok");
};

// ── PUBLISH MODAL ────────────────────────────────────────
window.publishSite=function(id){
  var s=state.sites.find(function(x){return x.id===id;});
  if(!s) return;
  state.publishingSiteId=id;
  var body=q("publishModalBody");
  if(body){
    body.innerHTML=
      '<p style="font-size:13.5px;color:var(--ink2);margin-bottom:18px;line-height:1.6">'+
      'Publishing <strong>'+esc(s.site_name||"your site")+'</strong>. Choose your plan:</p>'+
      '<div class="plan-grid">'+
        '<div class="plan-card highlighted">'+
          '<div class="plan-name">Starter</div>'+
          '<div class="plan-price">$30<span class="plan-period"> /year</span></div>'+
          '<div class="plan-desc">Perfect for getting online fast.</div>'+
          '<div class="plan-features">'+
            '<div>yoursite.websites.co.zw</div>'+
            '<div>AI content generation</div>'+
            '<div>Up to 6 products</div>'+
            '<div>10 image uploads</div>'+
            '<div>WhatsApp order button</div>'+
            '<div>Free SSL certificate</div>'+
          '</div>'+
          '<button class="btn btn-green" style="width:100%" onclick="selectPlan(\'starter\',30)">Select Starter</button>'+
        '</div>'+
        '<div class="plan-card highlighted-pro">'+
          '<div class="plan-name" style="color:var(--pro)">Pro ⭐</div>'+
          '<div class="plan-price">$60<span class="plan-period"> /year</span></div>'+
          '<div class="plan-desc">More power, your own .com domain.</div>'+
          '<div class="plan-features">'+
            '<div>Everything in Starter</div>'+
            '<div>Your own .com domain</div>'+
            '<div>Unlimited products</div>'+
            '<div>Appointment bookings</div>'+
            '<div>Video hosting</div>'+
            '<div>Priority support</div>'+
          '</div>'+
          '<button class="btn btn-pro" style="width:100%" onclick="selectPlan(\'pro\',60)">Select Pro</button>'+
        '</div>'+
      '</div>';
  }
  var confirmBtn=q("publishConfirmBtn");
  if(confirmBtn) confirmBtn.style.display="none"; // hidden; plan buttons handle it
  q("publishModal").classList.add("open");
};

window.selectPlan=async function(plan,amount){
  state.selectedPlan=plan; state.selectedAmount=amount;
  var confirmBtn=q("publishConfirmBtn");
  if(confirmBtn){
    confirmBtn.style.display="";
    confirmBtn.textContent="Pay & Publish — $"+amount+"/yr";
  }
  toast("Plan selected. Click 'Pay & Publish' to continue.","ok");
};

window.confirmPublish=async function(){
  var id=state.publishingSiteId; if(!id) return;
  var plan=state.selectedPlan||"starter";
  var amount=state.selectedAmount||30;
  var btn=q("publishConfirmBtn");
  if(btn){btn.disabled=true;btn.textContent="Initiating payment…";}
  try{
    var r=await api("/api/sites/"+encodeURIComponent(id)+"/publish",{
      method:"POST",
      body:JSON.stringify({plan:plan,amount:amount,currency:"USD"})
    });
    if(r.ok && r.data && r.data.payment_url){
      closePublishModalDirect();
      toast("Redirecting to Paynow…","ok");
      setTimeout(function(){location.href=r.data.payment_url;},600);
    } else {
      toast(r.data.error||r.data.message||"Payment initiation failed","err");
      if(btn){btn.disabled=false;btn.textContent="Pay & Publish — $"+amount+"/yr";}
    }
  }catch(e){
    toast("Network error — try again","err");
    if(btn){btn.disabled=false;btn.textContent="Pay & Publish — $"+amount+"/yr";}
  }
};

window.renewSite=function(id){
  state.publishingSiteId=id;
  state.selectedPlan="starter";
  state.selectedAmount=30;
  var s=state.sites.find(function(x){return x.id===id;});
  var body=q("publishModalBody");
  if(body){
    body.innerHTML=
      '<p style="font-size:13.5px;color:var(--ink2);margin-bottom:16px;line-height:1.6">'+
      'Renew <strong>'+esc(s?s.site_name:"your site")+'</strong> for another year.</p>'+
      '<div class="plan-card highlighted" style="max-width:280px">'+
        '<div class="plan-name">Annual renewal</div>'+
        '<div class="plan-price">$30<span class="plan-period"> /year</span></div>'+
        '<div class="plan-desc">Keeps your site live for another 12 months.</div>'+
      '</div>';
  }
  var cb=q("publishConfirmBtn");
  if(cb){cb.style.display="";cb.textContent="Pay & Renew — $30/yr";cb.disabled=false;}
  q("publishModal").classList.add("open");
};

window.closePublishModal=function(e){ if(e.target===q("publishModal")) closePublishModalDirect(); };
window.closePublishModalDirect=function(){ q("publishModal").classList.remove("open"); };

})();
</script>
</body>
</html>
