<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>websites — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fff;--bg2:#F6F7F9;--bg3:#FBFBFC;--ink:#0B0C0F;--ink2:#5A626E;--ink3:#9099A4;--line:#ECEEF1;--line2:#E2E5EA;--black:#101114;--green:#15924B;--yellow:#F4C20D;--red:#E23B2E;--blue:#1F6FEB;--r:14px;--ease:cubic-bezier(.22,1,.36,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hanken Grotesk",sans-serif;background:var(--bg2);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  .num{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.03em}
  h1,h2,h3{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.02em}
  a{color:inherit;text-decoration:none}
  .shell{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
  aside{background:#fff;border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .brand{display:inline-flex;align-items:center;font-family:"Archivo";font-weight:900;font-size:1.25rem;letter-spacing:-.04em;padding:6px 8px 18px;line-height:1}
  .brand .dots{display:inline-flex;flex-direction:column;gap:.07em;margin:0 .04em}.brand .dots i{width:.26em;height:.26em;border-radius:50%}
  .brand .dots i:nth-child(1){background:var(--green)}.brand .dots i:nth-child(2){background:var(--yellow)}.brand .dots i:nth-child(3){background:var(--red)}
  nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--ink2);font-size:.9rem;font-weight:500;cursor:pointer;transition:.18s}
  nav a:hover{background:var(--bg2);color:var(--ink)}nav a.on{background:var(--bg2);color:var(--ink);font-weight:600}
  nav a .ic{width:17px;height:17px;flex:none}
  .nav-sep{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:16px 12px 6px;font-weight:700}
  .who{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px;border-top:1px solid var(--line)}
  .who .av{width:32px;height:32px;border-radius:50%;background:var(--green);display:grid;place-items:center;font-size:.8rem;font-weight:700;color:#fff;flex:none}
  .who b{font-size:.85rem;font-weight:600}.who span{font-size:.72rem;color:var(--ink3)}
  main{padding:26px 30px 50px;overflow-x:hidden}
  .top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .top h1{font-size:1.7rem}.top p{color:var(--ink2);font-size:.88rem;margin-top:2px}
  .top-actions{display:flex;gap:10px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:.86rem;font-weight:600;padding:9px 15px;border-radius:10px;border:1px solid var(--line2);background:#fff;color:var(--ink);cursor:pointer;transition:.18s}
  .btn:hover{background:var(--bg2);border-color:var(--ink)}.btn.pri{background:var(--black);color:#fff;border-color:var(--black)}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:.8rem;color:var(--ink2);font-weight:500}.live .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;transition:.25s var(--ease)}
  .card:hover{box-shadow:0 16px 36px -26px rgba(11,12,15,.4);transform:translateY(-2px)}
  .card.hl{border:1.5px solid var(--green)}
  .card .lab{font-size:.76rem;color:var(--ink2);font-weight:600}
  .card .big{font-size:1.8rem;margin-top:7px}.card.hl .big{color:var(--green)}
  .card .sub{font-size:.76rem;margin-top:5px;font-weight:600}
  .up{color:var(--green)}.warn{color:#9A6B00}.muted{color:var(--ink3)}
  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px 22px}
  .panel h2{font-size:1.1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .panel h2 small{font-size:.76rem;color:var(--ink2);font-weight:500;font-family:"Hanken Grotesk"}
  .funnel{display:flex;flex-direction:column;gap:9px;margin-bottom:24px}
  .frow{display:flex;align-items:center;gap:14px}.frow .fl{width:120px;font-size:.85rem;color:var(--ink2);font-weight:500;flex:none}
  .frow .ft{flex:1;background:var(--bg2);border-radius:8px;overflow:hidden}
  .frow .fb{height:30px;border-radius:8px;display:flex;align-items:center;padding:0 12px;color:#fff;font-size:.82rem;font-weight:700;transition:width .8s var(--ease)}
  .frow .fp{width:54px;text-align:right;font-size:.8rem;color:var(--ink2);font-weight:600;flex:none}
  .two{display:grid;grid-template-columns:1.7fr 1fr;gap:20px;margin-bottom:24px}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  th{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);font-weight:700;text-align:left;padding:0 8px 9px}
  td{padding:11px 8px;font-size:.85rem;border-top:1px solid var(--line);vertical-align:middle}
  td.dom{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bdg{font-size:.74rem;font-weight:600;padding:3px 10px;border-radius:7px;white-space:nowrap;display:inline-block}
  .b-info{background:#E8F0FE;color:#1A4DA8}.b-ok{background:#E4F4EA;color:#13743C}.b-warn{background:#FCF1DB;color:#8A5B00}.b-danger{background:#FCEBEA;color:#A6271C}
  .stat{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--line)}
  .stat:first-of-type{border-top:none}.stat .k{font-size:.86rem;color:var(--ink2)}.stat .v{font-size:1.05rem;font-weight:700}
  .cohort{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .cc{border-radius:10px;padding:12px 8px;text-align:center;border:1px solid var(--line)}
  .cc .m{font-size:.72rem;color:var(--ink2);font-weight:600}.cc .pc{font-size:1.05rem;margin-top:4px;color:var(--green)}.cc .ct{font-size:.66rem;color:var(--ink3);margin-top:2px}
  .fade{opacity:0;transform:translateY(10px);animation:f .5s var(--ease) forwards}@keyframes f{to{opacity:1;transform:none}}
  @media(max-width:1080px){.cards{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}.cohort{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:760px){.shell{grid-template-columns:1fr}aside{display:none}}
</style></head>
<body>
<div class="shell">
  <aside>
    <a href="../index.html" class="brand">webs<span class="dots"><i></i><i></i><i></i></span>tes</a>
    <nav>
      <a class="on"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Overview</a>
      <a><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg>Sites</a>
      <a><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg>Domains</a>
      <a><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/></svg>Subscriptions</a>
      <a><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>Customers</a>
      <div class="nav-sep">Build</div>
      <a><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 9h16M9 9v11"/></svg>Templates</a>
      <a><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>Settings</a>
    </nav>
    <div class="who"><span class="av" id="who-av">L</span><div><b id="who-name">Lenni</b><br><span>Admin</span></div></div>
  </aside>
  <main>
    <div class="top">
      <div><h1>Operations</h1><p id="sub">Harare · loading…</p></div>
      <div class="top-actions"><span class="live"><span class="dot" id="dot"></span><span id="src">live</span></span><button class="btn" onclick="load()">↻ Refresh</button><button class="btn pri">Export</button></div>
    </div>
    <div class="cards" id="cards"></div>
    <div class="panel" style="margin-bottom:24px"><h2>Acquisition → upsell funnel <small id="fconv"></small></h2><div class="funnel" id="funnel"></div></div>
    <div class="two">
      <div class="panel"><h2>ZISPA domain queue <small id="qcounts"></small></h2><table><thead><tr><th style="width:42%">Domain</th><th style="width:26%">Customer</th><th style="width:20%">State</th><th style="width:12%">Age</th></tr></thead><tbody id="queue"></tbody></table></div>
      <div class="panel"><h2>Renewals &amp; churn</h2><div id="renewals"></div></div>
    </div>
    <div class="panel"><h2>E-store conversion by cohort <small>% upgraded to commerce</small></h2><div class="cohort" id="cohort"></div></div>
  </main>
</div>
<script>
const MOCK={meta:{location:"Harare",period:"this month",user:"Lenni"},metrics:{activeSites:3042,newThisMonth:118,arr:229000,mrr:7320,estoreCount:244,estoreConversion:0.08,convDelta:0.006,renewalsDue30d:214,failedPayments:9},funnel:[{label:"New signups",value:3042},{label:"Published",value:2880},{label:"Custom domain",value:1640},{label:"E-store",value:244}],queue:{counts:{submitted:17,pending:6,needsDocs:3},rows:[{domain:"mufakose-academy.co.zw",customer:"Mufakose Stars",state:"pending",age:"1d"},{domain:"brightsmile-dental.co.zw",customer:"Bright Smile",state:"submitted",age:"4h"},{domain:"moyo-legal.co.zw",customer:"Moyo & Partners",state:"needsDocs",age:"2d"},{domain:"sunrise-lodge.com",customer:"Sunrise Lodge",state:"active",age:"—"},{domain:"kombi-spares.co.zw",customer:"Kombi Spares",state:"submitted",age:"6h"}]},renewals:{due30d:214,renewalRate:0.86,failedPayments:9,grossMrrRetention:0.91},cohorts:[{month:"Jun",signups:180,pct:0.11},{month:"Jul",signups:205,pct:0.10},{month:"Aug",signups:240,pct:0.09},{month:"Sep",signups:262,pct:0.085},{month:"Oct",signups:288,pct:0.08},{month:"Nov",signups:301,pct:0.072},{month:"Dec",signups:264,pct:0.06},{month:"Jan",signups:118,pct:0.03}]};
const usd=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
const k=n=>n>=1000?'$'+Math.round(n/1000)+'k':usd(n);const cnt=n=>new Intl.NumberFormat('en-US').format(n);const pct=n=>(n*100).toFixed(1)+'%';
const STATE={pending:["pending ZISPA","b-info"],submitted:["submitted","b-info"],needsDocs:["needs docs","b-warn"],active:["active","b-ok"],rejected:["rejected","b-danger"]};
function render(d){
  document.getElementById('sub').textContent=d.meta.location+' · '+d.meta.period;document.getElementById('who-name').textContent=d.meta.user;document.getElementById('who-av').textContent=(d.meta.user||'A')[0];
  const m=d.metrics;
  document.getElementById('cards').innerHTML=[
    ['Active sites',cnt(m.activeSites),'up','+'+cnt(m.newThisMonth)+' this month',''],
    ['Annual run-rate',k(m.arr),'muted','ARR',''],
    ['True MRR · e-stores',usd(m.mrr),'muted',cnt(m.estoreCount)+' stores',''],
    ['E-store conversion',pct(m.estoreConversion),'up','▲ '+(m.convDelta*100).toFixed(1)+'pt','hl'],
    ['Renewals due · 30d',cnt(m.renewalsDue30d),'warn',m.failedPayments+' failed payments','']
  ].map((c,i)=>`<div class="card ${c[4]} fade" style="animation-delay:${i*.05}s"><div class="lab">${c[0]}</div><div class="big num">${c[1]}</div><div class="sub ${c[2]}">${c[3]}</div></div>`).join('');
  const max=d.funnel[0].value;
  document.getElementById('funnel').innerHTML=d.funnel.map((f,i)=>{const w=Math.max(8,Math.round(f.value/max*100));const col=['#9099A4','#5A626E','#1F6FEB','#15924B'][i];return `<div class="frow"><span class="fl">${f.label}</span><div class="ft"><div class="fb" style="width:${w}%;background:${col}">${cnt(f.value)}</div></div><span class="fp">${Math.round(f.value/max*100)}%</span></div>`}).join('');
  document.getElementById('fconv').textContent='signup → e-store: '+pct(d.funnel[3].value/d.funnel[0].value);
  const q=d.queue;document.getElementById('qcounts').textContent=`${q.counts.submitted} submitted · ${q.counts.pending} pending · ${q.counts.needsDocs} need docs`;
  document.getElementById('queue').innerHTML=q.rows.map(r=>{const s=STATE[r.state]||["—","b-info"];const aw=(r.age||'').includes('d')&&parseInt(r.age)>=2?'style="color:#9A6B00;font-weight:600"':'style="color:var(--ink2)"';return `<tr><td class="dom" title="${r.domain}">${r.domain}</td><td style="color:var(--ink2)">${r.customer}</td><td><span class="bdg ${s[1]}">${s[0]}</span></td><td ${aw}>${r.age}</td></tr>`}).join('');
  const rn=d.renewals;document.getElementById('renewals').innerHTML=[['Renewals due (30 days)',cnt(rn.due30d)],['Renewal rate',pct(rn.renewalRate)],['Gross MRR retention',pct(rn.grossMrrRetention)],['Failed payments',`<span style="color:#A6271C">${rn.failedPayments} · dunning</span>`]].map(s=>`<div class="stat"><span class="k">${s[0]}</span><span class="v">${s[1]}</span></div>`).join('');
  const cmax=Math.max(...d.cohorts.map(c=>c.pct));
  document.getElementById('cohort').innerHTML=d.cohorts.map(c=>{const a=(0.1+c.pct/cmax*0.8)*0.2;return `<div class="cc" style="background:rgba(21,146,75,${a})"><div class="m">${c.month}</div><div class="pc num">${(c.pct*100).toFixed(1)}%</div><div class="ct">${cnt(c.signups)} signups</div></div>`}).join('');
}
async function load(){try{const r=await fetch('/api/admin/dashboard',{credentials:'include'});if(!r.ok)throw 0;const d=await r.json();document.getElementById('src').textContent='live';document.getElementById('dot').style.background='var(--green)';render(d)}catch(e){document.getElementById('src').textContent='demo data';document.getElementById('dot').style.background='var(--yellow)';render(MOCK)}}
load();
</script>
</body></html>
